<?php include __DIR__ . '/../includes/header.php'; if(!admin_user()) redirect_to('auth/login.php'); $res=mysqli_query($conn,'SELECT * FROM products ORDER BY id'); ?><h1>Manage Products</h1><p><a class="btn" href="<?= BASE_URL ?>admin/product_form.php">Add Product</a></p><table class="table"><tr><th>Image</th><th>Name</th><th>Category</th><th>Price</th><th>Stock</th><th>Action</th></tr><?php while($p=mysqli_fetch_assoc($res)): ?><tr><td><img src="<?= BASE_URL ?>assets/images/<?= e($p['image']) ?>"></td><td><?= e($p['name']) ?></td><td><?= e($p['category']) ?></td><td>$<?= number_format((float)$p['price'],2) ?></td><td><?= e($p['stock']) ?></td><td><a href="<?= BASE_URL ?>admin/product_form.php?id=<?= $p['id'] ?>">Edit</a> | <a onclick="return confirm('Delete product?')" href="<?= BASE_URL ?>admin/delete_product.php?id=<?= $p['id'] ?>">Delete</a></td></tr><?php endwhile; ?></table><?php include __DIR__ . '/../includes/footer.php'; ?>