:root{--purple:#5b21b6;--purple2:#7c3aed;--light:#f4efff;--border:#e7e5ee;--text:#121826;--muted:#6b7280}*{box-sizing:border-box}body{margin:0;font-family:Arial,Helvetica,sans-serif;background:#fff;color:var(--text)}a{text-decoration:none;color:inherit}.header{min-height:86px;display:flex;align-items:center;gap:22px;padding:14px 34px;border-bottom:1px solid var(--border);background:#fff;position:sticky;top:0;z-index:99}.brand{display:flex;align-items:center;gap:12px;min-width:240px}.hanger{font-size:42px;color:var(--purple)}.brand-name{font-size:29px;font-weight:800}.brand-name span{color:var(--purple2)}.tagline{font-size:12px;font-weight:600}.nav{display:flex;gap:20px;font-size:14px;font-weight:700}.nav a:hover,.user-links a:hover{color:var(--purple)}.search{margin-left:auto;height:42px;display:flex;border:1px solid var(--border);border-radius:10px;overflow:hidden}.search input{width:245px;border:0;outline:0;padding:0 12px}.search button{border:0;background:#fff;width:44px;font-size:20px}.user-links{display:flex;align-items:center;gap:13px;font-size:13px;font-weight:700;white-space:nowrap}.hello{color:var(--purple)}.page{max-width:1280px;margin:auto;padding:26px}.hero{border-radius:18px;background:linear-gradient(110deg,#f5f0fb,#e7ded1);min-height:310px;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:50px}.hero h1{font-size:48px;line-height:1.05;margin:0 0 15px}.hero h1 span{color:var(--purple)}.hero p{font-size:17px;line-height:1.7;color:#374151}.hero-art{height:230px;border-radius:18px;background:rgba(255,255,255,.45);display:grid;place-items:center;font-size:120px}.btn{display:inline-block;border:0;border-radius:9px;background:var(--purple);color:#fff;font-weight:800;padding:13px 22px;margin:4px;cursor:pointer}.btn.secondary{background:#fff;color:#111827;border:1px solid #cbd5e1}.categories{display:flex;justify-content:space-between;gap:16px;margin:28px 0 22px;flex-wrap:wrap}.category{text-align:center;font-size:13px;font-weight:800}.category .circle{width:84px;height:84px;border-radius:50%;display:grid;place-items:center;background:#f2edf8;font-size:36px;margin-bottom:8px}.section-title{text-align:center;margin:28px 0 18px}.section-title h2{font-size:30px;margin:0 0 6px}.section-title p{margin:0;color:var(--muted)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:22px}.card{border:1px solid var(--border);border-radius:14px;overflow:hidden;background:#fff;box-shadow:0 6px 20px rgba(0,0,0,.05);position:relative}.card img{width:100%;height:230px;object-fit:cover;background:#f7f3ff;display:block}.card-body{padding:15px}.card h3{font-size:17px;margin:0 0 8px}.price{font-size:17px;font-weight:900}.stars{color:#f59e0b;margin:8px 0}.wishlist-heart{position:absolute;top:12px;right:12px;width:36px;height:36px;border-radius:50%;background:#fff;border:1px solid var(--border);display:grid;place-items:center;font-size:20px}.shop-layout{display:grid;grid-template-columns:260px 1fr 310px;gap:25px}.panel{border:1px solid var(--border);border-radius:16px;background:#fff;padding:20px;box-shadow:0 5px 18px rgba(0,0,0,.04)}.sidebar label{display:block;margin:12px 0;color:#374151}.filter{border-top:1px solid var(--border);margin-top:16px;padding-top:16px}.toolbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}.toolbar h1{margin:0}.toolbar p{margin:4px 0 0;color:var(--muted)}select,input,textarea{border:1px solid var(--border);border-radius:9px;padding:12px;width:100%;font-family:inherit}.auth-grid{max-width:980px;margin:28px auto;display:grid;grid-template-columns:1fr 1fr;gap:24px}.form-box{border:1px solid var(--border);border-radius:18px;background:#fff;padding:28px;box-shadow:0 8px 28px rgba(0,0,0,.06)}.form-box h2{margin-top:0}.form-box label{font-weight:700;font-size:14px}.form-box input,.form-box textarea,.form-box select{margin:8px 0 15px}.alert{background:#fef2f2;color:#991b1b;border:1px solid #fecaca;border-radius:10px;padding:12px;margin:12px 0}.success{background:#ecfdf5;color:#065f46;border-color:#bbf7d0}.table{width:100%;border-collapse:collapse;border:1px solid var(--border);border-radius:14px;overflow:hidden;background:#fff}.table th,.table td{border-bottom:1px solid var(--border);padding:14px;text-align:left;vertical-align:middle}.table th{background:#fafafa}.table img{width:70px;height:70px;object-fit:cover;border-radius:10px}.checkout-layout{display:grid;grid-template-columns:1fr 390px;gap:25px}.total{display:flex;justify-content:space-between;font-size:22px;font-weight:900;color:var(--purple);margin-top:16px}.order-success{max-width:850px;margin:30px auto;text-align:center}.check{font-size:70px;color:#16a34a}.timeline{display:flex;justify-content:space-around;gap:18px;margin:24px 0}.timeline div{background:var(--light);border-radius:16px;padding:18px;flex:1}.reco-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}.reason-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:18px;margin-top:28px}.admin-cards{display:grid;grid-template-columns:repeat(4,1fr);gap:18px}.admin-cards b{font-size:34px;color:var(--purple);display:block;margin-top:8px}.benefits{max-width:1180px;margin:24px auto;border:1px solid var(--border);border-radius:15px;display:grid;grid-template-columns:repeat(4,1fr);gap:18px;padding:22px;background:#fff}.benefits div{display:grid;grid-template-columns:40px 1fr;align-items:center}.benefits span{font-size:28px;grid-row:1/3}.benefits small{color:var(--muted)}.subscribe{max-width:1180px;margin:0 auto 18px;background:linear-gradient(90deg,#f1eaff,#fbfaff);border-radius:15px;padding:26px 34px;display:flex;align-items:center;justify-content:space-between;gap:20px}.subscribe h3{margin:0}.subscribe p{margin:7px 0 0;color:#374151}.subscribe form{display:flex;gap:10px;min-width:430px}.subscribe button{background:var(--purple);color:#fff;border:0;border-radius:9px;padding:0 24px;font-weight:800}.footer{text-align:center;color:var(--muted);padding:20px}.install-box{max-width:800px;margin:40px auto}@media(max-width:1050px){.header{height:auto;flex-wrap:wrap}.search{order:5;width:100%}.search input{width:100%}.hero,.shop-layout,.checkout-layout{grid-template-columns:1fr}.grid{grid-template-columns:repeat(2,1fr)}.benefits,.reason-grid,.admin-cards{grid-template-columns:repeat(2,1fr)}.subscribe{display:block}.subscribe form{min-width:0;margin-top:15px}}@media(max-width:650px){.page{padding:15px}.hero{padding:26px}.hero h1{font-size:34px}.grid,.auth-grid,.benefits,.reason-grid,.admin-cards{grid-template-columns:1fr}.timeline{flex-direction:column}.nav,.user-links{flex-wrap:wrap}.subscribe form{display:block}.subscribe button{height:44px;width:100%;margin-top:10px}}
.auth-page{

display:flex;
justify-content:center;
align-items:center;
min-height:75vh;

}


.auth-card{

width:850px;
display:grid;
grid-template-columns:1fr 1fr;
gap:40px;
background:white;
padding:40px;
border-radius:20px;

box-shadow:0 10px 30px rgba(0,0,0,0.1);

}



.auth-left{

padding:30px;

}


.auth-left h1{

font-size:38px;

}


.fashion-text{

margin-top:30px;
line-height:2;
color:#555;

}



.auth-form{

padding:20px;

}



.auth-form input{

width:100%;
padding:14px;
margin-bottom:20px;
border-radius:10px;
border:1px solid #ddd;

}



.password-box{

display:flex;

}



.password-box input{

border-radius:10px 0 0 10px;

}



.password-box button{

height:48px;
border:none;
background:#eee;
cursor:pointer;

}



.register-text{

text-align:center;
margin-top:20px;

}


.register-text a{

color:#111;
font-weight:bold;

}



@media(max-width:700px){


.auth-card{

grid-template-columns:1fr;

}


}
