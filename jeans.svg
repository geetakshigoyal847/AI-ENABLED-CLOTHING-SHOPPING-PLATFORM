<?php include __DIR__ . '/../includes/header.php'; if(!admin_user()) redirect_to('auth/login.php'); $id=(int)($_GET['id']??0); $p=['name'=>'','category'=>'','gender'=>'Unisex','description'=>'','price'=>'','size'=>'','color'=>'','stock'=>'','image'=>'hoodie.svg']; if($id) $p=mysqli_fetch_assoc(mysqli_query($conn,'SELECT * FROM products WHERE id='.$id)); ?><form class="form-box" method="post" action="<?= BASE_URL ?>admin/save_product.php"><h1><?= $id?'Edit Product':'Add Product' ?></h1><input type="hidden" name="id" value="<?= $id ?>"><label>Name</label><input name="name" value="<?= e($p['name']) ?>" required><label>Category</label><input name="category" value="<?= e($p['category']) ?>" required><label>Gender</label><input name="gender" value="<?= e($p['gender']) ?>"><label>Price</label><input name="price" value="<?= e($p['price']) ?>" required><label>Stock</label><input name="stock" value="<?= e($p['stock']) ?>" required><label>Size</label><input name="size" value="<?= e($p['size']) ?>"><label>Color</label><input name="color" value="<?= e($p['color']) ?>"><label>Image filename</label><input name="image" value="<?= e($p['image']) ?>"><label>Description</label><textarea name="description"><?= e($p['description']) ?></textarea><button class="btn">Save Product</button></form><?php include __DIR__ . '/../includes/footer.php'; ?>