<?php require_once __DIR__ . '/../includes/db.php'; if(!admin_user()) redirect_to('auth/login.php'); $id=(int)($_POST['id']??0); $name=mysqli_real_escape_string($conn,$_POST['name']??''); $category=mysqli_real_escape_string($conn,$_POST['category']??''); $gender=mysqli_real_escape_string($conn,$_POST['gender']??'Unisex'); $price=(float)($_POST['price']??0); $stock=(int)($_POST['stock']??0); $size=mysqli_real_escape_string($conn,$_POST['size']??''); $color=mysqli_real_escape_string($conn,$_POST['color']??''); $image=mysqli_real_escape_string($conn,$_POST['image']??'hoodie.svg'); $description=mysqli_real_escape_string($conn,$_POST['description']??''); if($id){ mysqli_query($conn,"UPDATE products SET name='$name',category='$category',gender='$gender',price=$price,stock=$stock,size='$size',color='$color',image='$image',description='$description' WHERE id=$id"); } else { mysqli_query($conn,"INSERT INTO products(name,category,gender,price,stock,size,color,image,description) VALUES('$name','$category','$gender',$price,$stock,'$size','$color','$image','$description')"); } redirect_to('admin/products.php'); ?>